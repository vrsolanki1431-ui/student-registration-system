<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
}

.container{
    width:90%;
    max-width:500px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

h2{
    text-align:center;
}

input,textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
}
</style>

</head>
<body>

<div class="container">

<h2>Student Registration Form</h2>

<form method="POST">
{% csrf_token %}

<label>Name</label>
<input type="text" name="name" required>

<label>Roll Number</label>
<input type="text" name="roll_number" required>

<label>Contact Number</label>
<input type="text" name="contact" required>

<label>Email</label>
<input type="email" name="email">

<label>Address</label>
<textarea name="address"></textarea>

<label>Date Of Birth</label>
<input type="date" name="dob">

<label>Course</label>
<input type="text" name="course">

<button type="submit">Register Student</button>

</form>

</div>

</body>
</html>
